<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wander</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="preloader" aria-hidden="true">
        <div class="preloader-images">
            <div class="preloader-img"><img src="img/preload1.jpg" alt=""></div>
            <div class="preloader-img"><img src="img/preload2.jpg" alt=""></div>
            <div class="preloader-img"><img src="img/preload3.jpg" alt=""></div>
            <div class="preloader-img"><img src="img/preload4.jpg" alt=""></div>
            <div class="preloader-img"><img src="img/preload5.jpg" alt=""></div>
            <div class="preloader-img"><img src="img/preload6.jpg" alt=""></div>
        </div>

        <div class="preloader-header">
            <h1>Wander</h1>
            <div class="preloader-counter">
                <p>000</p>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="left">
            <h1>
                <span class="flip-container">
                    <span class="flip-words">
                        <span>Discover</span>
                        <span>Ontdek</span>
                        <span>Fumanisa</span>
                        <span>Thola</span>
                        <span>Utolla</span>
                        <span>Sibolla</span>
                        <span>Lemoga</span>
                        <span>Tfola</span>
                        <span>Wanulusa</span>
                        <span>Kuma</span>
                        <span>Thola</span>
                        <span>Discover</span>
                    </span>
                </span>
            </h1>
            <nav aria-label="Main navigation">
                <ul class="nav_links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Destinations</a></li>
                    <li><a href="#">Blog</a></li>
                    <li><a href="#">About us</a></li>
                </ul>
            </nav>
        </div>

        <div class="right">
            <div class="search-area">
                <form id="searchForm" class="search-form" action="/search" method="GET">
                    <div class="search-box">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path
                                d="M9.5 3a6.5 6.5 0 0 1 5.17 10.44l5.44 5.45-1.42 1.41-5.44-5.44A6.5 6.5 0 1 1 9.5 3m0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9z" />
                        </svg>
                        <input type="search" id="searchQuery" name="q" placeholder="Search destinations"
                            aria-label="Search destinations" required>
                    </div>
                </form>
                <button class="search-icon-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </button>
            </div>
            <a class="bookBtn" href="#">Book <span class="btn-full">now</span></a>
        </div>
    </header>

    <main>
        <section class="image-sandwich-container" aria-label="Wander South Africa travel hero">
            <div class="sandwich-heading-layer">
                <h1 class="sandwich-text">Wander</h1>
                <img class="sandwich-logo" src="img/logo.png" alt="" aria-hidden="true">
            </div>

            <img src="img/subject.png" alt="Traveller exploring South Africa" class="subject-layer">

            <div class="sandwich-front-text">
                <p>Discover South Africa through culture, coastlines, and unforgettable local routes.</p>
                <div class="hero-actions">
                    <a class="hero-btn primary" href="#">Explore Tours</a>
                    <a class="hero-btn secondary" href="#">Plan your trip</a>
                </div>
            </div>
        </section>

    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
